<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>산업분류 코드 매칭</title>
  <style>
    :root {
      --bg-a: #f3faf6;
      --bg-b: #ecf4ff;
      --card: #fff;
      --ink: #16253a;
      --sub: #566378;
      --line: #d8e3ef;
      --primary: #1f7f5a;
      --primary-2: #14628b;
      --warn: #a85f00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: grid;
      place-items: center;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% 10%, #fff 0%, var(--bg-a) 45%, var(--bg-b) 100%);
    }
    .panel {
      width: min(1000px, 100%);
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: 0 18px 46px rgba(30, 67, 97, 0.14);
    }
    .head {
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(120deg, #e8fff4, #edf5ff);
    }
    .head h1 { margin: 0; font-size: 24px; }
    .head p { margin: 8px 0 0; font-size: 14px; color: var(--sub); }
    .body { display: grid; gap: 14px; padding: 18px 24px 24px; }
    textarea {
      width: 100%;
      min-height: 126px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      line-height: 1.45;
      outline: none;
      color: var(--ink);
    }
    textarea:focus { border-color: #8abfda; box-shadow: 0 0 0 4px rgba(83, 151, 193, 0.14); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      cursor: pointer;
    }
    .ghost {
      background: #fff;
      color: #254261;
      border: 1px solid var(--line);
      font-weight: 600;
    }
    .result { border: 1px solid var(--line); border-radius: 12px; padding: 14px; background: #fbfdff; }
    .result h2 { margin: 0 0 8px; font-size: 18px; }
    .meta { margin: 0 0 8px; color: var(--sub); font-size: 14px; }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 14px; }
    .chip { font-size: 12px; padding: 5px 10px; border-radius: 999px; border: 1px solid #b6d6ea; color: #1b597f; background: #ecf6fd; }
    .warn { color: var(--warn); font-weight: 700; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { border-top: 1px solid var(--line); text-align: left; padding: 8px 6px; }
    th { color: #2e4e69; font-size: 13px; }
    .candidate-btn {
      border: 0;
      background: transparent;
      color: #175f86;
      font-weight: 700;
      text-decoration: underline;
      cursor: pointer;
      padding: 0;
      border-radius: 0;
    }
    .guide {
      margin-top: 12px;
      border-top: 1px dashed var(--line);
      padding-top: 10px;
    }
    .guide h3 { margin: 0 0 8px; font-size: 15px; }
    .guide .subsec { margin: 8px 0; }
    .guide .subsec strong { display: block; color: #24425d; margin-bottom: 4px; }
    .guide ul { margin: 0; padding-left: 18px; color: #30495f; }
    .guide li { margin: 2px 0; }
  </style>
</head>
<body>
  <main class="panel">
    <section class="head">
      <h1>산업분류 코드 매칭</h1>
      <p id="sourceText">KSIC 제11차 데이터 로딩 중...</p>
    </section>
    <section class="body">
      <textarea id="industryInput" placeholder="예) 유리 제조, 자동차 제조, 전자상거래 의류 판매"></textarea>
      <div class="row">
        <button id="industryRun" type="button">코드 매칭하기</button>
        <button id="industrySample" class="ghost" type="button">샘플 넣기</button>
      </div>
      <section id="industryResult" class="result" aria-live="polite">
        <h2>결과 대기 중</h2>
        <p class="meta">업종 내역을 입력하고 매칭을 실행해 주세요.</p>
      </section>
    </section>
  </main>

  <script>
    const STOPWORDS = new Set([
      "업", "업종", "산업", "산업분류", "분류", "사업", "사업체", "회사",
      "기업", "제조", "제조업", "판매", "서비스", "서비스업", "기타", "관련"
    ]);

    const INTENT_TOKENS = {
      제조: new Set(["제조", "생산", "가공", "조립"]),
      판매: new Set(["판매", "유통", "도매", "소매", "쇼핑몰"]),
      수리: new Set(["수리", "정비", "보수"]),
      공사: new Set(["공사", "시공", "건설", "설치", "건축", "토목"]),
      운송: new Set(["운송", "물류", "배송", "택배", "화물", "여객", "운반"])
    };

    const SYNONYM_GROUPS = {
      정수기: new Set(["가전", "가전제품", "생활가전", "소형가전", "주방가전"]),
      공기청정기: new Set(["가전", "가전제품", "생활가전"]),
      비데: new Set(["가전", "가전제품", "생활가전"]),
      냉장고: new Set(["가전", "가전제품"]),
      세탁기: new Set(["가전", "가전제품"]),
      tv: new Set(["가전", "가전제품", "전자제품"]),
      전자상거래: new Set(["온라인", "인터넷", "쇼핑몰", "이커머스"]),
      쇼핑몰: new Set(["전자상거래", "온라인", "인터넷", "이커머스"]),
      자동차: new Set(["차량", "모빌리티", "완성차"]),
      오토바이: new Set(["이륜차", "모터사이클"]),
      지게차: new Set(["산업용", "운반장비", "건설기계"]),
      건설: new Set(["공사", "시공", "건축", "토목"]),
      시멘트: new Set(["건설자재", "비금속", "광물제품"]),
      유리: new Set(["비금속", "광물제품", "판유리"]),
      창호: new Set(["유리", "샤시", "건설자재"]),
      카페: new Set(["커피", "음료", "음료점"]),
      베이커리: new Set(["제과", "제빵", "빵"]),
      치킨: new Set(["음식점", "외식", "배달"]),
      소프트웨어: new Set(["소프트웨어개발", "프로그램", "개발", "it"]),
      앱개발: new Set(["소프트웨어", "프로그램", "개발", "it"]),
      데이터센터: new Set(["서버", "호스팅", "클라우드"]),
      병원: new Set(["의료", "의원", "진료"]),
      약국: new Set(["의약품", "의료"]),
      화장품: new Set(["뷰티", "미용", "코스메틱"])
    };

    let KSIC_ITEMS = [];
    let KSIC_BY_CODE = new Map();

    function normalize(text) {
      return (text || "")
        .toLowerCase()
        .trim()
        .replace(/[^0-9a-zA-Z가-힣]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function tokens(text, removeStopwords = true) {
      const norm = normalize(text);
      if (!norm) return [];
      return norm
        .split(" ")
        .map((s) => s.trim())
        .filter((s) => s.length >= 2 && (!removeStopwords || !STOPWORDS.has(s)));
    }

    function inferIntents(inputTokens) {
      const intents = new Set();
      for (const t of inputTokens) {
        for (const [intent, words] of Object.entries(INTENT_TOKENS)) {
          if (words.has(t)) intents.add(intent);
        }
      }
      return intents;
    }

    function expandTokens(inputTokens) {
      const expanded = [...inputTokens];
      const seen = new Set(expanded);
      for (const tok of inputTokens) {
        const aliases = SYNONYM_GROUPS[tok];
        if (!aliases) continue;
        for (const alias of aliases) {
          if (!seen.has(alias)) {
            seen.add(alias);
            expanded.push(alias);
          }
        }
      }
      return expanded;
    }

    function textMatchScore(q, t) {
      if (!q || !t) return 0;
      if (q === t) return 30;
      if (t.includes(q)) return 16;
      if (q.includes(t)) return 11;
      return 0;
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function overlapScore(inputTokens, targetTokens, perToken) {
      let score = 0;
      const hits = [];
      for (const tok of inputTokens) {
        if (targetTokens.has(tok)) {
          score += Math.min(perToken + tok.length * 0.3, perToken + 2.0);
          hits.push(tok);
        }
      }
      return { score, hits };
    }

    function scoreItem(inputText, item) {
      const queryNorm = normalize(inputText);
      const inputTokensRaw = tokens(inputText, false);
      const inputTokens = tokens(inputText, true);
      const inputTokensExpanded = expandTokens(inputTokens);
      const inputIntents = inferIntents(inputTokensRaw);

      const nameNorm = normalize(item.name || "");
      let score = textMatchScore(queryNorm, nameNorm);
      const hits = [];
      if (score > 0) hits.push(item.name);

      const nameSet = new Set(tokens(item.name || ""));
      const nameOverlap = overlapScore(inputTokens, nameSet, 6.2);
      score += nameOverlap.score;
      hits.push(...nameOverlap.hits);
      const nameSynOverlap = overlapScore(inputTokensExpanded, nameSet, 2.3);
      score += nameSynOverlap.score;
      hits.push(...nameSynOverlap.hits);

      const notes = Array.isArray(item.notes) ? item.notes : [];
      const includeNotes = Array.isArray(item.include_notes) ? item.include_notes : [];
      const excludeNotes = Array.isArray(item.exclude_notes) ? item.exclude_notes : [];
      const exampleNotes = Array.isArray(item.example_notes) ? item.example_notes : [];

      for (const note of notes) {
        const noteNorm = normalize(note);
        score += textMatchScore(queryNorm, noteNorm) * 0.45;
        const noteSet = new Set(tokens(note));
        const noteOverlap = overlapScore(inputTokens, noteSet, 2.4);
        score += noteOverlap.score;
        hits.push(...noteOverlap.hits);
        const noteSynOverlap = overlapScore(inputTokensExpanded, noteSet, 1.1);
        score += noteSynOverlap.score;
        hits.push(...noteSynOverlap.hits);
      }

      for (const note of includeNotes) {
        const set = new Set(tokens(note));
        const overlap = overlapScore(inputTokens, set, 2.9);
        score += overlap.score;
        hits.push(...overlap.hits);
        const synOverlap = overlapScore(inputTokensExpanded, set, 1.2);
        score += synOverlap.score;
        hits.push(...synOverlap.hits);
      }

      for (const note of exampleNotes) {
        const set = new Set(tokens(note));
        const overlap = overlapScore(inputTokens, set, 2.6);
        score += overlap.score;
        hits.push(...overlap.hits);
        const synOverlap = overlapScore(inputTokensExpanded, set, 1.2);
        score += synOverlap.score;
        hits.push(...synOverlap.hits);
      }

      const querySet = new Set(inputTokens);
      for (const note of excludeNotes) {
        const set = new Set(tokens(note));
        let overlapCount = 0;
        for (const t of querySet) {
          if (set.has(t)) overlapCount += 1;
        }
        score -= overlapCount * 1.8;
      }

      const combinedText = [item.name || "", ...notes, ...includeNotes, ...exampleNotes].join(" ");
      const combinedTokens = new Set(tokens(combinedText));
      for (const intent of inputIntents) {
        const words = INTENT_TOKENS[intent];
        let found = false;
        for (const w of words) {
          if (combinedTokens.has(w)) {
            found = true;
            break;
          }
        }
        if (!found) score -= 2.2;
      }

      if (/^[A-U]$/.test(item.code || "")) score *= 0.86;
      if ((item.code || "").length >= 4 && score >= 7) score += 0.7;

      const uniqHits = [...new Set(hits)].sort((a, b) => b.length - a.length).slice(0, 8);
      return {
        code: item.code,
        name: item.name,
        score: Math.max(score, 0),
        hits: uniqHits
      };
    }

    function classify(text) {
      const scored = KSIC_ITEMS
        .map((item) => scoreItem(text, item))
        .sort((a, b) => b.score - a.score);

      const top = scored[0];
      const second = scored[1] ? scored[1].score : 0;
      if (!top || top.score <= 0) {
        return {
          code: "UNMATCHED",
          name: "수동분류 필요",
          confidence: 0,
          matched_keywords: [],
          candidates: []
        };
      }

      const confidence = Math.max(0, Math.min(1, Number(((top.score - second) / (top.score + 1)).toFixed(3))));
      return {
        code: top.code,
        name: top.name,
        confidence,
        matched_keywords: top.hits,
        candidates: scored.slice(0, 3).map((x) => ({
          code: x.code,
          name: x.name,
          score: Number(x.score.toFixed(3))
        }))
      };
    }

    function renderGuideByCode(code) {
      const box = document.getElementById("guidePanel");
      if (!box) return;
      const item = KSIC_BY_CODE.get(String(code));
      if (!item) {
        box.innerHTML = `<h3>산업분류 해설</h3><p class="meta">선택한 코드의 해설 데이터를 찾지 못했습니다.</p>`;
        return;
      }

      const renderList = (arr) => {
        if (!arr || !arr.length) return `<p class="meta">등록된 내용 없음</p>`;
        return `<ul>${arr.slice(0, 8).map((x) => `<li>${escapeHtml(x)}</li>`).join("")}</ul>`;
      };

      box.innerHTML = `
        <h3>산업분류 해설: ${escapeHtml(item.code)} - ${escapeHtml(item.name)}</h3>
        <div class="subsec">
          <strong>설명</strong>
          ${renderList(item.notes)}
        </div>
        <div class="subsec">
          <strong>포함</strong>
          ${renderList(item.include_notes)}
        </div>
        <div class="subsec">
          <strong>제외</strong>
          ${renderList(item.exclude_notes)}
        </div>
        <div class="subsec">
          <strong>예시</strong>
          ${renderList(item.example_notes)}
        </div>
      `;
    }

    function render(result, text) {
      const resultBox = document.getElementById("industryResult");
      const chips = result.matched_keywords.length
        ? result.matched_keywords.map((k) => `<span class="chip">${k}</span>`).join("")
        : `<span class="warn">매칭 키워드 없음 (수동 분류 필요)</span>`;

      const rows = result.candidates.length
        ? result.candidates.map((c) => `
          <tr>
            <td><button type="button" class="candidate-btn" data-code="${escapeHtml(c.code)}">${escapeHtml(c.code)}</button></td>
            <td>${escapeHtml(c.name)}</td>
            <td>${c.score}</td>
          </tr>
        `).join("")
        : `<tr><td colspan="3">유효한 매칭 후보가 없습니다.</td></tr>`;

      resultBox.innerHTML = `
        <h2>추천 코드: ${result.code}</h2>
        <p class="meta">산업분류명: ${result.name}</p>
        <p class="meta">신뢰도: ${result.confidence.toFixed(3)} | 입력: ${text}</p>
        <div class="chips">${chips}</div>
        <table>
          <thead><tr><th>후보 코드</th><th>산업분류명</th><th>점수</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <section class="guide" id="guidePanel">
          <h3>산업분류 해설</h3>
          <p class="meta">후보 코드(파란 글씨)를 클릭하면 해설을 볼 수 있습니다.</p>
        </section>
      `;

      for (const btn of resultBox.querySelectorAll(".candidate-btn")) {
        btn.addEventListener("click", (event) => {
          const code = event.currentTarget.dataset.code;
          renderGuideByCode(code);
        });
      }
      if (result.candidates.length) {
        renderGuideByCode(result.candidates[0].code);
      }
    }

    async function loadIndex() {
      try {
        const res = await fetch("./ksic_index_full.json", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        KSIC_ITEMS = Array.isArray(data.items) ? data.items : [];
        KSIC_BY_CODE = new Map(KSIC_ITEMS.map((item) => [String(item.code), item]));
        const source = data.source ? `출처: ${data.source}` : "출처 정보 없음";
        document.getElementById("sourceText").textContent = `KSIC 제11차 데이터 반영 (${KSIC_ITEMS.length}개 항목) | ${source}`;
      } catch (error) {
        document.getElementById("sourceText").textContent = "인덱스 파일 로딩 실패: ksic_index_full.json 확인 필요";
      }
    }

    document.getElementById("industryRun").addEventListener("click", () => {
      const text = document.getElementById("industryInput").value.trim();
      if (!text) {
        alert("업종 내역을 입력해 주세요.");
        return;
      }
      if (!KSIC_ITEMS.length) {
        alert("인덱스 데이터 로딩이 아직 끝나지 않았습니다.");
        return;
      }
      render(classify(text), text);
    });

    document.getElementById("industrySample").addEventListener("click", () => {
      document.getElementById("industryInput").value = "자동차 제조";
    });

    loadIndex();
  </script>
</body>
</html>
