<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>誘쇱썝/?곗뾽遺꾨쪟 留ㅼ묶 ?붾㈃</title>
  <style>
    :root {
      --bg-a: #f3faf6;
      --bg-b: #ecf4ff;
      --card: #fff;
      --ink: #16253a;
      --sub: #566378;
      --line: #d8e3ef;
      --primary: #1f7f5a;
      --primary-2: #14628b;
      --tab-off: #f4f8fc;
      --warn: #a85f00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% 10%, #fff 0%, var(--bg-a) 45%, var(--bg-b) 100%);
    }
    .panel {
      width: min(1000px, 100%);
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: 0 18px 46px rgba(30, 67, 97, 0.14);
    }
    .head {
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(120deg, #e8fff4, #edf5ff);
    }
    .head h1 { margin: 0; font-size: 24px; }
    .head p { margin: 8px 0 0; font-size: 14px; color: var(--sub); }
    .tabs {
      display: flex;
      gap: 8px;
      padding: 14px 24px 0;
    }
    .tab-btn {
      border: 1px solid var(--line);
      background: var(--tab-off);
      color: #2b4762;
      padding: 8px 12px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }
    .tab-btn.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
    }
    .body {
      display: grid;
      gap: 14px;
      padding: 14px 24px 24px;
    }
    .view { display: none; }
    .view.active { display: grid; gap: 14px; }
    textarea {
      width: 100%;
      min-height: 126px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      line-height: 1.45;
      outline: none;
    }
    textarea:focus {
      border-color: #8abfda;
      box-shadow: 0 0 0 4px rgba(83, 151, 193, 0.14);
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      cursor: pointer;
    }
    .ghost {
      background: #fff;
      color: #254261;
      border: 1px solid var(--line);
      font-weight: 600;
    }
    .result {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      background: #fbfdff;
    }
    .result h2 { margin: 0 0 8px; font-size: 18px; }
    .meta { margin: 0 0 8px; color: var(--sub); font-size: 14px; }
    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0 14px;
    }
    .chip {
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid #b6d6ea;
      color: #1b597f;
      background: #ecf6fd;
    }
    .warn { color: var(--warn); font-weight: 700; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border-top: 1px solid var(--line);
      text-align: left;
      padding: 8px 6px;
    }
    th { color: #2e4e69; font-size: 13px; }
  </style>
</head>
<body>
  <main class="panel">
    <section class="head">
      <h1>?됱젙 ?낅Т ?먮룞 遺꾨쪟 ?붾㈃</h1>
      <p>誘쇱썝 ?뚭? 遺??遺꾨쪟? ?ъ뾽泥??곗뾽遺꾨쪟 肄붾뱶 留ㅼ묶?????붾㈃?먯꽌 ?ъ슜?????덉뒿?덈떎.</p>
    </section>

    <section class="tabs">
      <button class="tab-btn active" data-tab="complaint">誘쇱썝 遺꾨쪟</button>
      <button class="tab-btn" data-tab="industry">?곗뾽遺꾨쪟 肄붾뱶 留ㅼ묶</button>
    </section>

    <section class="body">
      <section id="complaintView" class="view active">
        <textarea id="complaintInput" placeholder="?? 遺덈쾿二쇱젙李?李⑤웾 ?뚮Ц??踰꾩뒪媛 ?듯뻾??紐삵빀?덈떎."></textarea>
        <div class="row">
          <button id="complaintRun" type="button">誘쇱썝 遺꾨쪟?섍린</button>
          <button id="complaintSample" class="ghost" type="button">?섑뵆 ?ｊ린</button>
        </div>
        <section id="complaintResult" class="result" aria-live="polite">
          <h2>寃곌낵 ?湲?以?/h2>
          <p class="meta">誘쇱썝 ?댁슜???낅젰????遺꾨쪟瑜??ㅽ뻾?섏꽭??</p>
        </section>
      </section>

      <section id="industryView" class="view">
        <textarea id="industryInput" placeholder="?? ?ㅻ쭏?몄뒪?좎뼱濡??앺솢?⑺뭹 ?⑤씪???먮ℓ"></textarea>
        <div class="row">
          <button id="industryRun" type="button">肄붾뱶 留ㅼ묶?섍린</button>
          <button id="industrySample" class="ghost" type="button">?섑뵆 ?ｊ린</button>
        </div>
        <section id="industryResult" class="result" aria-live="polite">
          <h2>寃곌낵 ?湲?以?/h2>
          <p class="meta">?ъ뾽泥??낆쥌 ?댁뿭???낅젰????留ㅼ묶???ㅽ뻾?섏꽭??</p>
        </section>
      </section>
    </section>
  </main>

  <script>
    const complaintRules = {
      "援먰넻?됱젙怨?: { keywords: { "踰꾩뒪": 3, "?앹떆": 3, "援먰넻?좏샇": 4, "?좏샇??: 4, "遺덈쾿二쇱젙李?: 5, "二쇱감": 3 } },
      "?꾨줈愿由ш낵": { keywords: { "?꾨줈": 2, "?ы듃?": 5, "?꾩뒪?뷀듃": 4, "蹂대룄釉붾줉": 4, "媛濡쒕벑": 3 } },
      "?섍꼍愿由ш낵": { keywords: { "?곕젅湲?: 4, "?먭린臾?: 4, "?낆랬": 5, "誘몄꽭癒쇱?": 4, "臾대떒?ш린": 5 } },
      "蹂듭??뺤콉怨?: { keywords: { "湲곗큹?앺솢": 4, "?앷퀎湲됱뿬": 4, "蹂듭?": 2, "?뚮큵": 3, "湲닿툒吏??: 4 } },
      "?곹븯?섎룄怨?: { keywords: { "?섎룛臾?: 4, "?꾩닔": 5, "?섏닔援?: 4, "?섏닔??: 4, "移⑥닔": 4 } }
    };

    const industryRules = {
      "F": { name: "건설업 (KSIC 제11차 대분류)", keywords: { "건설": 10, "건설업": 10, "공사": 4 } },
      "41": { name: "종합 건설업 (KSIC 제11차 중분류)", keywords: { "종합건설": 10, "건축공사": 8, "토목건축": 8, "건설": 6 } },
      "42": { name: "전문직별 공사업 (KSIC 제11차 중분류)", keywords: { "전문건설": 10, "배관공사": 8, "전기공사": 8, "설비공사": 8, "공사업": 7 } },
      "41000": { name: "종합 건설업", keywords: { "건설": 8, "건설업": 9, "건축공사": 7, "종합건설": 9, "공사": 3 } },
      "41220": { name: "토목 건설업", keywords: { "토목": 9, "토목공사": 9, "도로공사": 8, "건설": 5, "공사": 3 } },
      "42131": { name: "배관 및 냉난방 공사업", keywords: { "배관": 8, "설비공사": 8, "냉난방": 8, "건설": 4, "공사": 3 } },
      "47911": { name: "전자상거래 소매업", keywords: { "온라인쇼핑몰": 7, "쇼핑몰": 4, "스마트스토어": 6, "전자상거래": 7 } },
      "62010": { name: "컴퓨터 프로그래밍 서비스업", keywords: { "소프트웨어개발": 8, "앱개발": 7, "웹개발": 7, "프로그래밍": 6 } },
      "56111": { name: "한식 음식점업", keywords: { "한식": 6, "백반": 5, "국밥": 5, "식당": 3 } },
      "56220": { name: "비알코올 음료점업", keywords: { "카페": 6, "커피": 5, "음료": 3, "디저트카페": 6 } },
      "73100": { name: "광고업", keywords: { "광고대행": 8, "마케팅": 5, "브랜딩": 6 } },
      "96021": { name: "미용업", keywords: { "미용실": 8, "헤어샵": 8, "네일샵": 7, "피부관리": 7 } }
    };

    function normalize(text) {
      return (text || "").toLowerCase().replace(/\s+/g, "");
    }

    function scoreByRules(text, rules) {
      const input = normalize(text);
      const entries = [];

      for (const [key, cfg] of Object.entries(rules)) {
        let score = 0;
        const hits = [];
        for (const [keyword, weight] of Object.entries(cfg.keywords || {})) {
          if (input.includes(normalize(keyword))) {
            score += Number(weight);
            hits.push(keyword);
          }
        }
        entries.push({ key, score, hits, name: cfg.name || key });
      }

      entries.sort((a, b) => b.score - a.score);
      const top = entries[0];
      const secondScore = entries[1] ? entries[1].score : 0;
      const confidence = top.score > 0 ? Math.max(0, Math.min(1, Number(((top.score - secondScore) / (top.score + 1)).toFixed(3)))) : 0;

      return { entries, top, confidence };
    }

    function renderTable(candidates, type) {
      if (type === "complaint") {
        return candidates.map(c => `<tr><td>${c.key}</td><td>${c.score}</td></tr>`).join("");
      }
      return candidates.map(c => `<tr><td>${c.key}</td><td>${c.name}</td><td>${c.score}</td></tr>`).join("");
    }

    function runComplaint() {
      const text = document.getElementById("complaintInput").value.trim();
      if (!text) return alert("誘쇱썝 ?댁슜???낅젰?댁＜?몄슂.");
      const { entries, top, confidence } = scoreByRules(text, complaintRules);
      const candidates = entries.slice(0, 3);
      const resultBox = document.getElementById("complaintResult");
      const chips = top.score > 0 ? top.hits.map(k => `<span class="chip">${k}</span>`).join("") : `<span class="warn">留ㅼ묶 ?ㅼ썙???놁쓬 (?섎룞 寃??沅뚯옣)</span>`;
      const dept = top.score > 0 ? top.key : "誘쇱썝珥앷큵(?섎룞遺꾨쪟)";
      resultBox.innerHTML = `
        <h2>異붿쿇 遺?? ${dept}</h2>
        <p class="meta">?좊ː?? ${confidence.toFixed(3)} | ?낅젰: ${text}</p>
        <div class="chips">${chips}</div>
        <table>
          <thead><tr><th>?꾨낫 遺??/th><th>?먯닔</th></tr></thead>
          <tbody>${renderTable(candidates, "complaint")}</tbody>
        </table>
      `;
    }

    function runIndustry() {
      const text = document.getElementById("industryInput").value.trim();
      if (!text) return alert("?낆쥌 ?댁뿭???낅젰?댁＜?몄슂.");
      const { entries, top, confidence } = scoreByRules(text, industryRules);
      const candidates = entries.slice(0, 3);
      const resultBox = document.getElementById("industryResult");
      const chips = top.score > 0 ? top.hits.map(k => `<span class="chip">${k}</span>`).join("") : `<span class="warn">留ㅼ묶 ?ㅼ썙???놁쓬 (?섎룞 遺꾨쪟 ?꾩슂)</span>`;
      const matchedCode = top.score > 0 ? top.key : "UNMATCHED";
      const matchedName = top.score > 0 ? top.name : "?섎룞遺꾨쪟 ?꾩슂";
      resultBox.innerHTML = `
        <h2>異붿쿇 肄붾뱶: ${matchedCode}</h2>
        <p class="meta">?곗뾽遺꾨쪟紐? ${matchedName}</p>
        <p class="meta">?좊ː?? ${confidence.toFixed(3)} | ?낅젰: ${text}</p>
        <div class="chips">${chips}</div>
        <table>
          <thead><tr><th>?꾨낫 肄붾뱶</th><th>?곗뾽遺꾨쪟紐?/th><th>?먯닔</th></tr></thead>
          <tbody>${renderTable(candidates, "industry")}</tbody>
        </table>
      `;
    }

    document.getElementById("complaintRun").addEventListener("click", runComplaint);
    document.getElementById("industryRun").addEventListener("click", runIndustry);
    document.getElementById("complaintSample").addEventListener("click", () => {
      document.getElementById("complaintInput").value = "遺덈쾿二쇱젙李?李⑤웾 ?뚮Ц??踰꾩뒪媛 ?듯뻾??紐삵빀?덈떎. ?⑥냽 ?붿껌?⑸땲??";
    });
    document.getElementById("industrySample").addEventListener("click", () => {
      document.getElementById("industryInput").value = "건설";
    });

    for (const btn of document.querySelectorAll(".tab-btn")) {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.dataset.tab;
        document.getElementById("complaintView").classList.toggle("active", tab === "complaint");
        document.getElementById("industryView").classList.toggle("active", tab === "industry");
      });
    }
  </script>
</body>
</html>
