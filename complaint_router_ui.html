<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>산업분류 코드 매칭</title>
  <style>
    :root {
      --bg-a: #f3faf6;
      --bg-b: #ecf4ff;
      --card: #fff;
      --ink: #16253a;
      --sub: #566378;
      --line: #d8e3ef;
      --primary: #1f7f5a;
      --primary-2: #14628b;
      --warn: #a85f00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: grid;
      place-items: center;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% 10%, #fff 0%, var(--bg-a) 45%, var(--bg-b) 100%);
    }
    .panel {
      width: min(1000px, 100%);
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: 0 18px 46px rgba(30, 67, 97, 0.14);
    }
    .head {
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(120deg, #e8fff4, #edf5ff);
    }
    .head h1 { margin: 0; font-size: 24px; }
    .head p { margin: 8px 0 0; font-size: 14px; color: var(--sub); }
    .body { display: grid; gap: 14px; padding: 18px 24px 24px; }
    textarea {
      width: 100%;
      min-height: 126px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      line-height: 1.45;
      outline: none;
      color: var(--ink);
    }
    textarea:focus {
      border-color: #8abfda;
      box-shadow: 0 0 0 4px rgba(83, 151, 193, 0.14);
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      cursor: pointer;
    }
    .ghost {
      background: #fff;
      color: #254261;
      border: 1px solid var(--line);
      font-weight: 600;
    }
    .result {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      background: #fbfdff;
    }
    .result h2 { margin: 0 0 8px; font-size: 18px; }
    .meta { margin: 0 0 8px; color: var(--sub); font-size: 14px; }
    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0 14px;
    }
    .chip {
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid #b6d6ea;
      color: #1b597f;
      background: #ecf6fd;
    }
    .warn { color: var(--warn); font-weight: 700; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border-top: 1px solid var(--line);
      text-align: left;
      padding: 8px 6px;
    }
    th { color: #2e4e69; font-size: 13px; }
  </style>
</head>
<body>
  <main class="panel">
    <section class="head">
      <h1>산업분류 코드 매칭</h1>
      <p>사업체 업종 내역을 입력하면 KSIC 규칙 기반으로 산업분류 코드를 추천합니다.</p>
    </section>

    <section class="body">
      <textarea id="industryInput" placeholder="예: 유리 제조"></textarea>
      <div class="row">
        <button id="industryRun" type="button">코드 매칭하기</button>
        <button id="industrySample" class="ghost" type="button">샘플 넣기</button>
      </div>
      <section id="industryResult" class="result" aria-live="polite">
        <h2>결과 대기 중</h2>
        <p class="meta">업종 내역을 입력한 뒤 매칭을 실행하세요.</p>
      </section>
    </section>
  </main>

  <script>
    const industryRules = {
      "C": { name: "제조업 (KSIC 제11차 대분류)", keywords: { "제조": 4, "제조업": 6, "가공": 2 } },
      "23": { name: "비금속 광물제품 제조업 (KSIC 제11차 중분류)", keywords: { "비금속": 8, "광물제품": 7, "세라믹": 6, "유리": 5 } },
      "29": { name: "자동차 및 트레일러 제조업 (KSIC 제11차 중분류)", keywords: { "자동차": 10, "자동차제조": 12, "자동차 제조": 12, "트레일러": 8, "차량제조": 9, "완성차": 9 } },
      "231": { name: "유리 및 유리제품 제조업 (KSIC 제11차 중분류)", keywords: { "유리": 10, "유리제품": 9, "유리제조": 12, "판유리": 8, "강화유리": 8 } },
      "F": { name: "건설업 (KSIC 제11차 대분류)", keywords: { "건설": 10, "건설업": 10, "공사": 4 } },
      "41": { name: "종합 건설업 (KSIC 제11차 중분류)", keywords: { "종합건설": 10, "건축공사": 8, "토목건축": 8, "건설": 6 } },
      "42": { name: "전문직별 공사업 (KSIC 제11차 중분류)", keywords: { "전문건설": 10, "배관공사": 8, "전기공사": 8, "설비공사": 8, "공사업": 7 } },
      "41000": { name: "종합 건설업", keywords: { "건설": 8, "건설업": 9, "건축공사": 7, "종합건설": 9, "공사": 3 } },
      "41220": { name: "토목 건설업", keywords: { "토목": 9, "토목공사": 9, "도로공사": 8, "건설": 5, "공사": 3 } },
      "42131": { name: "배관 및 냉난방 공사업", keywords: { "배관": 8, "설비공사": 8, "냉난방": 8, "건설": 4, "공사": 3 } },
      "47911": { name: "전자상거래 소매업", keywords: { "온라인쇼핑몰": 7, "쇼핑몰": 4, "스마트스토어": 6, "전자상거래": 7 } },
      "62010": { name: "컴퓨터 프로그래밍 서비스업", keywords: { "소프트웨어개발": 8, "앱개발": 7, "웹개발": 7, "프로그래밍": 6 } },
      "56111": { name: "한식 음식점업", keywords: { "한식": 6, "백반": 5, "국밥": 5, "식당": 3 } },
      "56220": { name: "비알코올 음료점업", keywords: { "카페": 6, "커피": 5, "음료": 3, "디저트카페": 6 } },
      "73100": { name: "광고업", keywords: { "광고대행": 8, "마케팅": 5, "브랜딩": 6 } },
      "96021": { name: "미용업", keywords: { "미용실": 8, "헤어샵": 8, "네일샵": 7, "피부관리": 7 } }
    };

    function normalize(text) {
      return (text || "").toLowerCase().replace(/\s+/g, "");
    }

    function scoreByRules(text, rules) {
      const input = normalize(text);
      const entries = [];
      for (const [key, cfg] of Object.entries(rules)) {
        let score = 0;
        const hits = [];
        for (const [keyword, weight] of Object.entries(cfg.keywords || {})) {
          if (input.includes(normalize(keyword))) {
            score += Number(weight);
            hits.push(keyword);
          }
        }
        entries.push({ key, score, hits, name: cfg.name || key });
      }
      entries.sort((a, b) => b.score - a.score);
      const top = entries[0];
      const secondScore = entries[1] ? entries[1].score : 0;
      const confidence = top.score > 0 ? Math.max(0, Math.min(1, Number(((top.score - secondScore) / (top.score + 1)).toFixed(3)))) : 0;
      return { entries, top, confidence };
    }

    function renderTable(candidates) {
      return candidates.map((c) => `<tr><td>${c.key}</td><td>${c.name}</td><td>${c.score}</td></tr>`).join("");
    }

    function runIndustry() {
      const text = document.getElementById("industryInput").value.trim();
      if (!text) return alert("업종 내역을 입력해주세요.");

      const { entries, top, confidence } = scoreByRules(text, industryRules);
      const candidates = entries.slice(0, 3);
      const resultBox = document.getElementById("industryResult");
      const chips = top.score > 0 ? top.hits.map((k) => `<span class="chip">${k}</span>`).join("") : `<span class="warn">매칭 키워드 없음 (수동 분류 필요)</span>`;
      const matchedCode = top.score > 0 ? top.key : "UNMATCHED";
      const matchedName = top.score > 0 ? top.name : "수동분류 필요";
      const rows = top.score > 0 ? renderTable(candidates) : `<tr><td colspan="3">유효한 매칭 후보가 없습니다.</td></tr>`;

      resultBox.innerHTML = `
        <h2>추천 코드: ${matchedCode}</h2>
        <p class="meta">산업분류명: ${matchedName}</p>
        <p class="meta">신뢰도: ${confidence.toFixed(3)} | 입력: ${text}</p>
        <div class="chips">${chips}</div>
        <table>
          <thead><tr><th>후보 코드</th><th>산업분류명</th><th>점수</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    document.getElementById("industryRun").addEventListener("click", runIndustry);
    document.getElementById("industrySample").addEventListener("click", () => {
      document.getElementById("industryInput").value = "자동차 제조";
    });
  </script>
</body>
</html>
